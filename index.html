<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World Multiplyer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
        }
        input, button {
            margin: 10px;
            padding: 10px;
            font-size: 1em;
        }
        .output {
            margin-top: 20px;
            font-size: 1.2em;
            color: #333;
        }
        button.active {
            background-color: #007bff;
            color: white;
        }
    </style>
</head>
<body>
    <h1>Hello World Multiplyer</h1>
    <input type="text" id="textInput" placeholder="Gib deinen Text hier ein" maxlength="20">
    <br>
    <button id="btn1x">1x</button>
    <button id="btn2x">2x</button>
    <button id="btn3x">3x</button>
    <br>
    <button id="generateBtn" disabled>Generate</button>
    <div class="output" id="output"></div>
    <script src="script.js"></script>
</body>
</html>
