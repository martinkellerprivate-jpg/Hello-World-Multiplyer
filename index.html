<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World Multiplyer</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: url('https://source.unsplash.com/1600x900/?romantic-beach') no-repeat center center/cover;
            color: #fff;
            text-align: center;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.3);
        }

        input {
            padding: 10px;
            font-size: 1rem;
            border: none;
            border-radius: 5px;
            margin-bottom: 20px;
            width: 80%;
            max-width: 400px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        .button-group button {
            padding: 10px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        .button-group button:hover {
            transform: scale(1.1);
            background-color: #4e8cff;
        }

        .button-group button.active {
            background-color: #fff;
            color: #6a11cb;
        }

        .generate-button {
            background-color: #ff6b6b;
            color: #fff;
        }

        .generate-button:hover {
            background-color: #ff3b3b;
        }

        #output {
            margin-top: 30px;
            font-size: 1.2rem;
            background: rgba(255, 255, 255, 0.3);
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <h1>Hello World Multiplyer</h1>
    <input type="text" id="textInput" placeholder="Gib deinen Text hier ein" maxlength="20">
    <div class="button-group">
        <button id="btn1x">1x</button>
        <button id="btn2x">2x</button>
        <button id="btn3x">3x</button>
    </div>
    <button id="generateBtn" class="generate-button" disabled>Generate</button>
    <div id="output"></div>
    <script src="script.js"></script>
</body>
</html>
